*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:#fff;color:#1a1a1a;overflow:hidden;height:100vh}
.font-serif{font-family:'Cormorant Garamond',serif}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-track{background:transparent}
.scroll::-webkit-scrollbar-thumb{background:#e5e5e5;border-radius:4px}
.scroll::-webkit-scrollbar-thumb:hover{background:#bbb}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .5s ease-out forwards}
@keyframes pulse-ring{0%{transform:scale(.8);opacity:1}100%{transform:scale(1.6);opacity:0}}
.pulse-ring{animation:pulse-ring 1.8s ease-out infinite}
.typing-dot{animation:typing 1.4s infinite ease-in-out;fill:#1a1a1a}
.typing-dot:nth-child(1){animation-delay:0s}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-2px);opacity:1}}
.tab-active{color:#1a1a1a!important;border-bottom:2px solid #1a1a1a}
.card-hover{transition:all .3s ease}
.card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
.phase-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.5px}
</style>

let currentTab = 'intel';
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>{
    const active = b.dataset.tab===tab;
    b.classList.toggle('tab-active',active);
    b.classList.toggle('text-gray-900',active);
    b.classList.toggle('text-gray-400',!active);
  });
  const c = document.getElementById('tab-content');
  c.scrollTo({top:0});
  switch(tab){
    case 'intel': renderIntel(); break;
    case 'fair':  renderFair();  break;
    case 'pitch': renderPitch(); break;
    case 'track': renderTrack(); break;
  }
}

  // Highlight months relevant to current procurement window (Christmas = 11,12,1)

                    <div class="w-5 h-5 rounded-full bg-gray-900 text-white flex items-center justify-center text-[8px] font-bold">${member?.avatar||'?'}</div>
                    <span class="text-[10px] text-gray-400">${member?.name||'未指派'}</span>
                  </div>
                  ${status!=='done'?`
                  <div class="flex gap-1.5 mt-2">
                    ${status==='pending'?`<button onclick="moveTask(${t.id},'in-progress')" class="text-[9px] bg-blue-500 text-white px-2 py-0.5 rounded hover:bg-blue-600">開始</button>`:''}
                    ${status==='in-progress'?`<button onclick="moveTask(${t.id},'done')" class="text-[9px] bg-emerald-500 text-white px-2 py-0.5 rounded hover:bg-emerald-600">完成</button>`:''}
                  </div>`:''}
                </div>`;
              }).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function moveTask(id,newStatus){
  const t = TASKS.find(t=>t.id===id);
  if(t) t.status = newStatus;
  renderTrack();
  renderKPI();
}

const CJK_STOP = new Set('的了是在和有一這個不也我你他她它子地得著過被把讓給比跟同從對向裡外上下前後左右中很都但就因為以所而那些多少大小啊哦喔嗯吧呢嗎'.split(''));

function processAI(raw){
  const q = raw.toLowerCase();
  let reply = '';

  // Brand queries
  const brandMatch = KATALOG_DB.find(p=>q.includes(p.brand.toLowerCase()));
  if(brandMatch){
    const brand = brandMatch.brand;
    const items = KATALOG_DB.filter(p=>p.brand===brand);
    const cats  = [...new Set(items.map(p=>p.cat))].join('、');
    reply = `<p class="font-bold mb-1">${brand} 品牌情報</p>
      <p class="text-gray-500">資料庫中共 ${items.length} 筆記錄，涵蓋：${cats}。</p>
      <p class="text-gray-500 mt-1">代表商品：${items.slice(0,3).map(p=>`${p.nameZH}(€${p.price})`).join('、')}。</p>
      <p class="text-orange-600 text-[10px] mt-1">💡 ${items[0].note}</p>`;
    addBotMsg(reply);
    intelFilter = brand; switchTab('intel');
    return;
  }

  // Phase queries
  if(q.includes('phase 1')||q.includes('第一期')){
    const items = KATALOG_DB.filter(p=>p.fairPhase===1);
    reply = `<p class="font-bold mb-1">⚡ 廣交會第一期留意清單</p>
      <p class="text-gray-500">4/15–4/19 · 硬科技、家電、五金。共 ${items.length} 項目標商品。</p>
      <p class="text-gray-500 mt-1">重點：高性價比氣炸鍋(FOB<$12)、Parkside 一電多機生態、便攜式儲能。</p>`;
    addBotMsg(reply); switchTab('fair'); return;
  }
  if(q.includes('phase 2')||q.includes('第二期')){
    const items = KATALOG_DB.filter(p=>p.fairPhase===2);
    reply = `<p class="font-bold mb-1">🏠 廣交會第二期留意清單</p>
      <p class="text-gray-500">4/23–4/27 · 家居、禮品、園藝。共 ${items.length} 項目標商品。</p>
      <p class="text-gray-500 mt-1">首要：聖誕LED裝飾(對標€17.99)、環保蠟燭、Flat-pack 戶外傢俱。</p>`;
    addBotMsg(reply); switchTab('fair'); return;
  }
  if(q.includes('phase 3')||q.includes('第三期')){
    const items = KATALOG_DB.filter(p=>p.fairPhase===3);
    reply = `<p class="font-bold mb-1">👕 廣交會第三期留意清單</p>
      <p class="text-gray-500">5/1–5/5 · 紡織、玩具、運動。共 ${items.length} 項目標商品。</p>
      <p class="text-gray-500 mt-1">重點：蓄熱保暖面料(OEKO-TEX)、EN71益智玩具、Crivit露營裝備。</p>`;
    addBotMsg(reply); switchTab('fair'); return;
  }

  // Season / procurement queries
  if(q.includes('聖誕')||q.includes('christmas')||q.includes('冬季')){
    const xmasItems = KATALOG_DB.filter(p=>p.shelfSeason.includes('winter'));
    reply = `<p class="font-bold mb-1">🎄 聖誕/冬季採購情報</p>
      <p class="text-gray-500">${WINDOW.desc}</p>
      <p class="text-gray-500 mt-1">共 ${xmasItems.length} 項冬季上架商品。涵蓋 Silvercrest 送禮家電、Livarno Home 聖誕裝飾、Playtive 玩具等。</p>
      <p class="text-red-600 text-[10px] mt-1 font-bold">⚠️ 黃金窗口期：4月–5月必須完成採購決策!</p>`;
    addBotMsg(reply); return;
  }

  if(q.includes('pitch')||q.includes('簡報')||q.includes('deck')){
    if(selectedPitchProducts.length){
      reply = `<p class="font-bold mb-1">📑 Pitch Deck 就緒</p>
        <p class="text-gray-500">目前已選取 ${selectedPitchProducts.length} 項商品。可在 Pitch Deck 頁面預覽並匯出 PDF。</p>`;
    } else {
      // Auto-select Christmas items
      selectedPitchProducts = KATALOG_DB.filter(p=>p.shelfSeason.includes('winter')).slice(0,6).map(p=>p.id);
      reply = `<p class="font-bold mb-1">📑 已自動選取聖誕檔期商品</p>
        <p class="text-gray-500">已為您加入 ${selectedPitchProducts.length} 項冬季熱門 SKU。切換至 Pitch Deck 頁面即可預覽與匯出。</p>`;
    }
    addBotMsg(reply); switchTab('pitch'); return;
  }

  if(q.includes('團隊')||q.includes('任務')||q.includes('track')||q.includes('follow')){
    reply = `<p class="font-bold mb-1">👥 團隊任務概覽</p>
      <p class="text-gray-500">待啟動: ${TASKS.filter(t=>t.status==='pending').length} · 進行中: ${TASKS.filter(t=>t.status==='in-progress').length} · 完成: ${TASKS.filter(t=>t.status==='done').length}</p>
      <p class="text-gray-500 mt-1">系統將在 48 小時未跟進時自動催辦。</p>`;
    addBotMsg(reply); switchTab('track'); return;
  }

  // Product keyword search
  const cjk = (raw.match(/[\u4e00-\u9fff]/g)||[]).filter(c=>!CJK_STOP.has(c));
  const eng = (q.match(/[a-z0-9]{2,}/g)||[]);
  if(cjk.length||eng.length){
    const results = KATALOG_DB.filter(p=>{
      let score=0;
      cjk.forEach(c=>{if(p.nameZH.includes(c))score+=3;if(p.cat.includes(c))score+=1;});
      eng.forEach(w=>{if(p.nameEN.toLowerCase().includes(w))score+=3;if(p.brand.toLowerCase().includes(w))score+=2;});
      return score>0;
    });
    if(results.length){
      reply = `<p class="font-bold mb-1">🔍 搜尋「${raw}」</p>
        <p class="text-gray-500">找到 ${results.length} 項相關商品：</p>
        <div class="mt-1 space-y-0.5">${results.slice(0,5).map(p=>`<div class="text-[10px] text-gray-500">· ${p.brand} ${p.nameZH} (€${p.price})</div>`).join('')}</div>`;
      addBotMsg(reply); return;
    }
  }

  // Fallback
  reply = `<p class="text-gray-500">收到「${raw}」。您可以嘗試輸入：品牌名稱(如 Silvercrest)、季節(如 聖誕)、Phase 1/2/3、或「生成Pitch Deck」。</p>`;
  addBotMsg(reply);
}
