        document.getElementById('question-text').innerText = questions[currentQ].q;

        // 生成選項

        optionsDiv.innerHTML = '';
        const labels = ["1. 非常不符合", "2. 稍微不符合", "3. 中立 / 視情況", "4. 稍微符合", "5. 非常符合"];

            btn.className = 'option-btn';
            btn.innerText = label;
            // 點擊後計算分數並進入下一題
            btn.onclick = () => answerQuestion(index + 1);
            optionsDiv.appendChild(btn);
        });
    }

    function answerQuestion(value) {
        let q = questions[currentQ];
        // 動態判定：若是正向題直接加分，反向題觸發 6-value 翻轉機制
        let scoreToAdd = q.r === 1? value : (6 - value);
        scores[q.d] += scoreToAdd;
        
        currentQ++;
        renderQuestion();
    }

    function calculateResults() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-container').style.display = 'block';

        const mean = 90;
        const sd = 15;
        let pct = {};

        // Z-Score 轉換與貝葉斯常態機率映射
        for(let dim in scores) {
            let z = (scores[dim] - mean) / sd;
            // 利用 Logistic 函數逼近 Normal CDF 計算絕對連續百分位數
            let percentile = 1 / (1 + Math.exp(-1.702 * z));
            pct[dim] = (percentile * 100).toFixed(2);

        feedbackHTML += `<div class="feedback-section"><h4>🧠 認知獲取模組</h4>`;
        if(pct.N >= 70) {
            feedbackHTML += `<p><strong>動態診斷：</strong> 高度開放的發散性思維，擅長跨領域整合。<br><strong>實務建議：</strong> 必須拋棄清單式的機械目標，改採「願景驅動型」設定。在談判桌上，您是天生的 3-D 交易設計師，當陷入價格死局時，應主動發動「多議題打包戰術」，引入新變數（如交貨期、授權）來重構談判空間。</p>`;
        } else if (pct.N < 30) {
            feedbackHTML += `<p><strong>動態診斷：</strong> 大腦處理資訊顆粒度極細，依賴具體物理現實。<br><strong>實務建議：</strong> 目標設定必須嚴格遵守「SMART原則」與標準作業流程（SOP）。談判時，善用「精確細節錨定效應」，提出精算至小數點的報價，利用極精確的數字暗示底線，大幅限縮對手的還價幅度。</p>`;
        } else {
            feedbackHTML += `<p><strong>動態診斷：</strong> 兼顧宏觀模式識別與微觀細節處理。<br><strong>實務建議：</strong> 您的談判優勢在於全盤掌控。建議在談判前先確認雙方核心願景，隨後再穩步將抽象願景轉譯為具有法律效力的實體條款，避免見林不見樹。</p>`;
        }
        feedbackHTML += `</div>`;

        // 3. 決策維度 (F) 的情緒衝突管理
        feedbackHTML += `<div class="feedback-section"><h4>⚖️ 決策濾網模組</h4>`;
        if(pct.F >= 70) {
            feedbackHTML += `<p><strong>動態診斷：</strong> 決策將人際和諧與信任置於首位，面臨衝突時容易妥協。<br><strong>實務建議：</strong> 實施強大的「角色剝離戰術」。在談判前，心態上將自己轉化為重要群體的「保護者代理人」，嚴格寫下自身底線與最佳替代方案（BATNA），陷入情緒泥沼時強制要求暫停。</p>`;
        } else if (pct.F < 30) {
            feedbackHTML += `<p><strong>動態診斷：</strong> 能輕易將情緒變數剝離，完全依據效率與邏輯進行分配型談判。<br><strong>實務建議：</strong> 極易忽視對手的顏面導致關係破裂。請刻意練習 FBI 專用的「策略性同理心」，強迫使用反映式傾聽與同理標籤（如「聽起來您對期限感到擔憂」），以瞬間降低對手的防備。</p>`;
        } else {
            feedbackHTML += `<p><strong>動態診斷：</strong> 邏輯因果與人際感受在決策方程式中權重平衡。<br><strong>實務建議：</strong> 這是談判桌上最具彈性的狀態。建議面對強勢對手時切換為冰冷邏輯模式，而在面對需要建立長期聯盟的夥伴時，主動釋放同理信號以創造整合型價值。</p>`;
        }
        feedbackHTML += `</div>`;

        // 4. 外部維度 (J) 的應變與執行力
        feedbackHTML += `<div class="feedback-section"><h4>⚙️ 外部適應模組</h4>`;
        if(pct.J >= 75) {
            feedbackHTML += `<p><strong>動態診斷：</strong> 擁有強大內部秩序感，但面對突發混亂時自我效能易受挫。<br><strong>實務建議：</strong> 導入「容錯型精熟經驗」訓練。在日常嚴密的計畫中，強制注入 20% 的混沌時間；練習「假設情境矩陣規劃」，將應對突發變故視為能力的展現，降低對絕對完美的病態執著。</p>`;
        } else if (pct.J < 40) {
            feedbackHTML += `<p><strong>動態診斷：</strong> 極度抗拒死板結構，適應力強，自信來自臨場靈感爆發。<br><strong>實務建議：</strong> 全面放棄線性瀑布流計畫法，改採「敏捷式自我管理」。將目標切碎為 3 天至 1 週的「衝刺週期」，並利用物理層面的軟體約束切斷干擾，將無序性限制在創意發想時間內。</p>`;
        } else {
            feedbackHTML += `<p><strong>動態診斷：</strong> 執行力與混亂容忍度並重。<br><strong>實務建議：</strong> 適合擔任敏捷開發與傳統管理之間的橋樑。在工作中，為核心戰略設立硬性死線，但對執行路徑保留足夠的開放性，以吸收未知的創新機會。</p>`;
        }
        feedbackHTML += `</div>`;

        document.getElementById('dynamic-feedback').innerHTML = feedbackHTML;
    }

    // 初始化問卷
    window.onload = renderQuestion;
</script>
