let curTab='intel';
function switchTab(t){
  curTab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>{
    const a=b.dataset.tab===t;
    b.classList.toggle('tab-active',a);b.classList.toggle('text-gray-900',a);b.classList.toggle('text-gray-400',!a);
  });
  const c=document.getElementById('tab-content');c.scrollTo({top:0});
  ({intel:renderIntel,fair:renderFair,pitch:renderPitch,track:renderTrack})[t]();
}

function isSeasonMatch(p){
  if(selSeason==='all') return false;

}
function isMonthHighlight(m){

  const s=getSeason(selSeason);
  return s.shelfM.includes(m);
}

  const w=window.open('','_blank','width=1020,height=760');
  if(w){w.document.write(html);w.document.close();}
  else{const b=new Blob([html],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='pitch-deck.html';document.body.appendChild(a);a.click();a.remove();}
}

// ══════════════════════════════════════
// AI ASSISTANT
// ══════════════════════════════════════
const chatBox=document.getElementById('chat-msgs');
function addBot(h){chatBox.insertAdjacentHTML('beforeend',`<div class="flex"><div class="bg-white border border-gray-100 rounded-lg px-2.5 py-2 text-[10px] leading-relaxed shadow-sm text-gray-700 max-w-full">${h}</div></div>`);chatBox.scrollTop=chatBox.scrollHeight;}
function addUsr(t){chatBox.insertAdjacentHTML('beforeend',`<div class="flex justify-end"><div class="bg-gray-100 rounded-lg px-2.5 py-1.5 text-[10px] max-w-[90%]">${t}</div></div>`);chatBox.scrollTop=chatBox.scrollHeight;}
function showDots(){const id='d'+Date.now();chatBox.insertAdjacentHTML('beforeend',`<div id="${id}" class="flex"><div class="bg-white border border-gray-100 rounded-lg px-2.5 py-2 shadow-sm"><svg class="w-7 h-3" viewBox="0 0 28 12"><circle class="typing-dot" cx="5" cy="6" r="2.5"/><circle class="typing-dot" cx="14" cy="6" r="2.5"/><circle class="typing-dot" cx="23" cy="6" r="2.5"/></svg></div></div>`);chatBox.scrollTop=chatBox.scrollHeight;return id;}

// Init greeting
addBot(`<p class="font-bold mb-1">早安。</p>
<p class="text-gray-500 mb-1">距廣交會 <strong class="text-red-600">D-${daysUntil(CF[0].start)}</strong>。資料庫 <strong>${DB.length}</strong> 項商品。</p>
<p class="text-gray-500 mb-1">當前窗口: <strong>${getSeason(selSeason).label}</strong></p>
<div class="mt-1.5 space-y-0.5">
  <button onclick="aiQ('聖誕採購')" class="block text-left text-[9px] text-gray-500 hover:text-gray-900 px-1.5 py-0.5 rounded w-full hover:bg-gray-50">▸ 聖誕採購建議</button>
  <button onclick="aiQ('Silvercrest')" class="block text-left text-[9px] text-gray-500 hover:text-gray-900 px-1.5 py-0.5 rounded w-full hover:bg-gray-50">▸ Silvercrest 分析</button>
  <button onclick="aiQ('Phase 1')" class="block text-left text-[9px] text-gray-500 hover:text-gray-900 px-1.5 py-0.5 rounded w-full hover:bg-gray-50">▸ Phase 1 留意清單</button>
  <button onclick="aiQ('生成Pitch')" class="block text-left text-[9px] text-gray-500 hover:text-gray-900 px-1.5 py-0.5 rounded w-full hover:bg-gray-50">▸ 自動生成 Pitch</button>
</div>`);

document.getElementById('chat-form').addEventListener('submit',e=>{e.preventDefault();const v=document.getElementById('chat-in').value.trim();if(!v)return;aiQ(v);document.getElementById('chat-in').value='';});

function aiQ(msg){
  addUsr(msg);const tid=showDots();
  setTimeout(()=>{document.getElementById(tid)?.remove();processAI(msg);},700);
}

function processAI(raw){
  const q=raw.toLowerCase();let r='';
  // Brand
  const bm=DB.find(p=>q.includes(p.brand.toLowerCase()));
  if(bm){
    const brand=bm.brand,items=DB.filter(p=>p.brand===brand);
    const cats=[...new Set(items.map(p=>p.cat))].join('、');
    r=`<p class="font-bold mb-0.5">${brand} (${items.length}項)</p><p class="text-gray-500">${cats}</p>
    <p class="text-gray-500 mt-0.5">代表：${items.slice(0,3).map(p=>p.nameZH+'€'+p.price).join('、')}</p>`;
    addBot(r);brandFilter=brand;switchTab('intel');return;
  }
  // Phase
  for(let i=1;i<=3;i++){if(q.includes('phase '+i)||q.includes('第'+['零','一','二','三'][i]+'期')){
    const items=DB.filter(p=>p.fairPhase===i);
    r=`<p class="font-bold mb-0.5">${CF[i-1].icon} 第${i}期 (${items.length}項)</p><p class="text-gray-500">${CF[i-1].focus}</p>`;
    addBot(r);switchTab('fair');return;}}
  // Season
  if(q.includes('聖誕')||q.includes('冬季')){
    const n=DB.filter(p=>p.months.some(m=>[11,12,1].includes(m)));
    r=`<p class="font-bold mb-0.5">🎄 聖誕/冬季 (${n.length}項)</p><p class="text-gray-500">採購黃金窗口：3–5月。Lidl 11月初即上架聖誕商品。</p>`;
    addBot(r);selSeason='xmas';renderKPI();switchTab('intel');return;}
  if(q.includes('春季')){selSeason='spring';renderKPI();switchTab('intel');addBot('已切換至🌸春季檔期');return;}
  // Pitch
  if(q.includes('pitch')||q.includes('簡報')){
    if(!pitchIds.length){const s=getSeason(selSeason);const items=DB.filter(p=>p.months.some(m=>s.shelfM.includes(m))).slice(0,8);pitchIds=items.map(p=>p.id);}
    addBot(`📑 已選${pitchIds.length}項，跳轉Pitch頁面。`);switchTab('pitch');return;}
  // Search
  const hits=DB.filter(p=>{const s=p.nameZH+p.nameEN+p.brand+p.cat;return q.split('').some(c=>s.toLowerCase().includes(c)&&c.match(/[\u4e00-\u9fff]/))||q.split(/\s+/).some(w=>w.length>1&&s.toLowerCase().includes(w));});
  if(hits.length&&hits.length<DB.length){
    r=`<p class="font-bold mb-0.5">🔍 ${hits.length}項</p>${hits.slice(0,5).map(p=>`<div class="text-[9px] text-gray-500">· ${p.brand} ${p.nameZH} €${p.price}</div>`).join('')}`;
    addBot(r);return;}
  addBot(`<p class="text-gray-500">可嘗試：品牌名、季節、Phase 1/2/3、「生成Pitch」</p>`);
}

// ══════════════════════════════════════

renderKPI();
switchTab('intel');
</script>
