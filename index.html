<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatz Global - Super Secretary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@200;300;400;500;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFFFFF; color: #1A1A1A; }
        .font-serif-elegant { font-family: 'Cormorant Garamond', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 2px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E5E5E5; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #CCCCCC; }
        .typing-dot { animation: typing 1.4s infinite ease-in-out; fill: #1A1A1A; }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-2px); opacity: 1; }
        }
        .img-wrap { overflow: hidden; background: #F0F0F0; }
        .img-zoom { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .product-card:hover .img-zoom { transform: scale(1.06); }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.6s ease-out forwards; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-gray-900 selection:text-white">

    <!-- Header -->
    <header class="h-16 flex items-center justify-between px-8 flex-shrink-0 z-20 border-b border-gray-100 bg-white/80 backdrop-blur-md">
        <div class="flex items-center gap-12">
            <div class="flex items-center gap-3 cursor-pointer">
                <h1 class="text-xl font-medium tracking-wide text-gray-900">SPATZ <span class="font-light text-gray-400">GLOBAL</span></h1>
            </div>
            <nav class="hidden md:flex space-x-8">
                <button onclick="filterCatalog('all')" class="text-[11px] font-medium tracking-[0.15em] text-gray-900 uppercase nav-btn relative" data-filter="all">
                    All Collection
                    <span class="absolute -bottom-2 left-0 w-full h-[1px] bg-gray-900 transition-transform origin-left scale-x-100 nav-line"></span>
                </button>
                <button onclick="filterCatalog('tchibo')" class="text-[11px] font-medium tracking-[0.15em] text-gray-400 hover:text-gray-900 uppercase transition-colors nav-btn relative" data-filter="tchibo">
                    Tchibo
                    <span class="absolute -bottom-2 left-0 w-full h-[1px] bg-gray-900 transition-transform origin-left scale-x-0 nav-line"></span>
                </button>
                <button onclick="filterCatalog('lidl')" class="text-[11px] font-medium tracking-[0.15em] text-gray-400 hover:text-gray-900 uppercase transition-colors nav-btn relative" data-filter="lidl">
                    Lidl
                    <span class="absolute -bottom-2 left-0 w-full h-[1px] bg-gray-900 transition-transform origin-left scale-x-0 nav-line"></span>
                </button>
                <button onclick="filterCatalog('ikea')" class="text-[11px] font-medium tracking-[0.15em] text-gray-400 hover:text-gray-900 uppercase transition-colors nav-btn relative" data-filter="ikea">
                    IKEA
                    <span class="absolute -bottom-2 left-0 w-full h-[1px] bg-gray-900 transition-transform origin-left scale-x-0 nav-line"></span>
                </button>
            </nav>
        </div>
        <div class="flex items-center gap-6 text-gray-500">
            <div class="text-[10px] tracking-widest uppercase flex items-center gap-2 hidden sm:flex border border-gray-200 px-3 py-1 rounded-full">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> AI SYNCED
            </div>
            <button class="hover:text-gray-900 transition-colors"><i class="ph ph-magnifying-glass text-lg"></i></button>
            <button class="hover:text-gray-900 transition-colors w-7 h-7 rounded-full bg-gray-50 flex items-center justify-center text-xs font-medium border border-gray-100">王</button>
        </div>
    </header>

    <!-- Body -->
    <div class="flex-1 flex overflow-hidden bg-white">

        <!-- Product Grid -->
        <main class="flex-1 overflow-y-auto custom-scrollbar p-8 lg:p-12 relative">
            <div class="max-w-[1400px] mx-auto">
                <div class="flex flex-col mb-12 animate-fade-up">
                    <p class="text-[10px] text-gray-400 tracking-[0.2em] uppercase mb-2" id="catalog-subtitle">DISPLAYING 105 ITEMS</p>
                    <div class="flex justify-between items-end">
                        <h2 class="text-4xl font-serif-elegant italic text-gray-900" id="catalog-title">Curated Selection 2026.</h2>
                        <div class="flex gap-4">
                            <button class="text-xs font-medium tracking-widest uppercase text-gray-500 hover:text-gray-900 transition-colors flex items-center gap-2 border-b border-transparent hover:border-gray-900 pb-1">
                                <i class="ph ph-faders"></i> Filter
                            </button>
                            <!-- FIX 2: 綁定 downloadPDF() -->
                            <button onclick="downloadPDF()" class="text-xs font-medium tracking-widest uppercase text-gray-900 transition-colors flex items-center gap-2 border-b border-gray-900 pb-1">
                                <i class="ph ph-download-simple"></i> Export PDF
                            </button>
                        </div>
                    </div>
                </div>
                <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-x-8 gap-y-16 pb-20"></div>
            </div>
        </main>

        <!-- AI Assistant -->
        <aside class="w-full md:w-[280px] bg-[#FAFAFA] border-l border-gray-100 flex flex-col z-20 flex-shrink-0">
            <div class="h-16 flex items-center justify-between px-5 border-b border-gray-100">
                <div class="flex items-center gap-2.5">
                    <div class="w-2 h-2 bg-gray-900 rounded-full"></div>
                    <h3 class="font-medium text-gray-900 text-[11px] tracking-widest uppercase">Assistant</h3>
                </div>
                <button class="text-gray-400 hover:text-gray-900 transition-colors"><i class="ph ph-dots-three text-lg"></i></button>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto custom-scrollbar p-5 space-y-6">
                <div class="flex flex-col gap-2">
                    <div class="bg-white text-gray-800 rounded-lg px-4 py-3 text-[12px] leading-relaxed border border-gray-100 shadow-sm">
                        <p class="font-medium mb-1">您好，王姐。</p>
                        <p class="text-gray-500">已載入 105 款商品。可輸入品牌名稱，或直接輸入商品關鍵字（如「椅子」「咖啡機」「沙發」）進行篩選：</p>
                    </div>
                    <div class="flex flex-col gap-1.5 mt-1">
                        <button onclick="sendPredefinedMessage('準備 Tchibo 戶外系列提案')" class="text-left text-[11px] text-gray-500 hover:text-gray-900 hover:bg-gray-100 px-3 py-2 rounded transition-colors tracking-wide">▸ Tchibo 戶外提案</button>
                        <button onclick="sendPredefinedMessage('篩選 Lidl 性價比廚具五金')" class="text-left text-[11px] text-gray-500 hover:text-gray-900 hover:bg-gray-100 px-3 py-2 rounded transition-colors tracking-wide">▸ Lidl 廚具五金專案</button>
                        <button onclick="sendPredefinedMessage('調出 IKEA 經典傢俱與家紡')" class="text-left text-[11px] text-gray-500 hover:text-gray-900 hover:bg-gray-100 px-3 py-2 rounded transition-colors tracking-wide">▸ IKEA 經典居家專案</button>
                    </div>
                </div>
            </div>
            <div class="p-4 bg-[#FAFAFA]">
                <form id="chat-form" class="relative flex items-center">
                    <!-- FIX 1: Placeholder 提示支援商品關鍵字搜尋 -->
                    <input type="text" id="chat-input" placeholder="搜尋商品 或 輸入指令…"
                        class="w-full bg-white border border-gray-200 text-[12px] rounded-full pl-4 pr-10 py-2.5 focus:outline-none focus:border-gray-900 transition-all shadow-sm placeholder-gray-300">
                    <button type="submit" class="absolute right-1.5 w-7 h-7 bg-gray-900 text-white rounded-full flex items-center justify-center hover:bg-gray-700 transition-colors">
                        <i class="ph-bold ph-arrow-up text-[10px]"></i>
                    </button>
                </form>
            </div>
        </aside>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════
    //  PRODUCT DATA  (穩定 Unsplash ID + onerror fallback)
    // ═══════════════════════════════════════════════════════
    const baseProducts = [
        { targetBrand:"ikea",   baseName:"POÄNG 舒適單人扶手椅",   price:65,  orig:149, img:"https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"客廳傢俱" },
        { targetBrand:"ikea",   baseName:"BILLY 極簡多層書櫃",      price:35,  orig:89,  img:"https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"收納系統" },
        { targetBrand:"ikea",   baseName:"KALLAX 方格層架組",       price:42,  orig:99,  img:"https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"收納系統" },
        { targetBrand:"ikea",   baseName:"MALM 雙人實木床框",       price:85,  orig:220, img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"臥室傢俱" },
        { targetBrand:"ikea",   baseName:"STRANDMON 經典單椅",      price:95,  orig:249, img:"https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?w=600&h=750&auto=format&fit=crop&q=80", tag:"Trend", line:"客廳傢俱" },
        { targetBrand:"ikea",   baseName:"IKEA 365+ 不鏽鋼湯鍋",   price:18,  orig:45,  img:"https://images.unsplash.com/photo-1484154218962-a197022b5858?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"餐廚用品" },
        { targetBrand:"ikea",   baseName:"FEJKA 人造常春藤盆栽",    price:4.5, orig:12,  img:"https://images.unsplash.com/photo-1416879595882-3373a0480b5b?w=600&h=750&auto=format&fit=crop&q=80", tag:"Trend", line:"居家裝飾" },
        { targetBrand:"ikea",   baseName:"RÅSKOG 三層活動推車",     price:22,  orig:55,  img:"https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"收納配件" },
        { targetBrand:"ikea",   baseName:"STOCKHOLM 羊毛地毯",      price:75,  orig:199, img:"https://images.unsplash.com/photo-1575037614876-c385ec8bb1ab?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"紡織品"   },
        { targetBrand:"ikea",   baseName:"NÄVLINGE LED 工作燈",     price:12,  orig:29,  img:"https://images.unsplash.com/photo-1513506003901-1e6a229e9d15?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"燈具照明" },
        { targetBrand:"lidl",   baseName:"PARKSIDE 20V 充電電鑽",   price:38,  orig:85,  img:"https://images.unsplash.com/photo-1504148455328-c376907d081c?w=600&h=750&auto=format&fit=crop&q=80", tag:"Trend", line:"五金工具" },
        { targetBrand:"lidl",   baseName:"SILVERCREST 5L 氣炸鍋",   price:42,  orig:99,  img:"https://images.unsplash.com/photo-1585515320310-259814833e62?w=600&h=750&auto=format&fit=crop&q=80", tag:"Trend", line:"廚房家電" },
        { targetBrand:"lidl",   baseName:"CRIVIT 高密防滑瑜珈墊",   price:9,   orig:25,  img:"https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"運動健身" },
        { targetBrand:"lidl",   baseName:"ERNESTO 鑄鐵琺瑯燉鍋",    price:28,  orig:79,  img:"https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"廚房用具" },
        { targetBrand:"lidl",   baseName:"PARKSIDE 高壓清洗機",     price:55,  orig:140, img:"https://images.unsplash.com/photo-1581578731548-c64695cc6952?w=600&h=750&auto=format&fit=crop&q=80", tag:"Trend", line:"五金工具" },
        { targetBrand:"lidl",   baseName:"SILVERCREST 手持攪拌棒",  price:14,  orig:35,  img:"https://images.unsplash.com/photo-1570222094114-d054a817e56b?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"廚房家電" },
        { targetBrand:"lidl",   baseName:"LUPILU 純棉嬰兒連身衣",   price:6,   orig:18,  img:"https://images.unsplash.com/photo-1519689680058-324335c77eba?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"嬰童服飾" },
        { targetBrand:"lidl",   baseName:"ESMARA 女款無縫內衣",     price:4.5, orig:15,  img:"https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"基礎服飾" },
        { targetBrand:"lidl",   baseName:"CRIVIT 專業健身阻力帶",   price:5,   orig:16,  img:"https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"運動健身" },
        { targetBrand:"lidl",   baseName:"PARKSIDE 32件螺絲起子組", price:11,  orig:29,  img:"https://images.unsplash.com/photo-1572981779307-38b8cabb2407?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"五金工具" },
        { targetBrand:"tchibo", baseName:"Cafissimo 膠囊咖啡機",    price:45,  orig:120, img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&h=750&auto=format&fit=crop&q=80", tag:"Trend", line:"咖啡生活" },
        { targetBrand:"tchibo", baseName:"TCM 戶外防潑水衝鋒衣",    price:28,  orig:89,  img:"https://images.unsplash.com/photo-1551698618-1dfe5d97d256?w=600&h=750&auto=format&fit=crop&q=80", tag:"Trend", line:"戶外服飾" },
        { targetBrand:"tchibo", baseName:"Premium 庭院編織沙發",    price:135, orig:399, img:"https://images.unsplash.com/photo-1600210491369-e753d80a41f3?w=600&h=750&auto=format&fit=crop&q=80", tag:"Trend", line:"戶外傢俱" },
        { targetBrand:"tchibo", baseName:"TCM 高階旅行拉桿箱",      price:52,  orig:160, img:"https://images.unsplash.com/photo-1565026057447-bc90829ce0ae?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"旅行箱包" },
        { targetBrand:"tchibo", baseName:"雙層抗UV戶外遮陽傘",       price:48,  orig:135, img:"https://images.unsplash.com/photo-1527018601619-a508a2be00cd?w=600&h=750&auto=format&fit=crop&q=80", tag:"Trend", line:"庭院配件" },
        { targetBrand:"tchibo", baseName:"純棉高支數雙人床包組",     price:32,  orig:95,  img:"https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"質感家紡" },
        { targetBrand:"tchibo", baseName:"便攜式手搖咖啡磨豆機",    price:14,  orig:42,  img:"https://images.unsplash.com/photo-1516224498413-84ecf3a1e7fd?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"咖啡生活" },
        { targetBrand:"tchibo", baseName:"TCM 輕量化折疊露營椅",    price:19,  orig:58,  img:"https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=600&h=750&auto=format&fit=crop&q=80", tag:"Trend", line:"戶外休閒" },
        { targetBrand:"tchibo", baseName:"法蘭絨保暖沙發萬用毯",    price:15,  orig:45,  img:"https://images.unsplash.com/photo-1555881400-74d7acaacd8b?w=600&h=750&auto=format&fit=crop&q=80", tag:"Basic", line:"質感家紡" },
        { targetBrand:"tchibo", baseName:"高碳鋼園藝修剪工具組",    price:8,   orig:26,  img:"https://images.unsplash.com/photo-1416879598555-25e6837ca72c?w=600&h=750&auto=format&fit=crop&q=80", tag:"Trend", line:"園藝生活" }
    ];

    const variantSuffixes = [
        { name:"Classic Edition", priceMult:1.00 },
        { name:"Pro Series",      priceMult:1.25 },
        { name:"Eco/Compact",     priceMult:0.85 },
        { name:"Limited Color",   priceMult:1.10 }
    ];

    const fullCatalog = [];
    let idCounter = 1;
    baseProducts.forEach((base, idx) => {
        const count = (idx % 2 === 0) ? 4 : 3; // 15×4 + 15×3 = 固定 105
        for (let i = 0; i < count; i++) {
            const v = variantSuffixes[i];
            fullCatalog.push({
                id:          idCounter++,
                name:        `${base.baseName} — ${v.name}`,
                targetBrand: base.targetBrand,
                tag:         base.tag,
                line:        base.line,
                price:       +(base.price    * v.priceMult).toFixed(2),
                origPrice:   +(base.orig     * v.priceMult).toFixed(2),
                img:         base.img
            });
        }
    });
    fullCatalog.sort(() => Math.random() - 0.5);

    // ═══════════════════════════════════════════════════════
    //  STATE
    // ═══════════════════════════════════════════════════════
    // FIX 2 依賴此變數 —— 永遠跟蹤畫面上正在顯示的商品
    let currentDisplayedProducts = [...fullCatalog];
    const grid = document.getElementById('product-grid');

    // ═══════════════════════════════════════════════════════
    //  RENDER
    // ═══════════════════════════════════════════════════════
    function renderProducts(data) {
        currentDisplayedProducts = [...data]; // 同步狀態給 PDF 使用
        let html = '';
        data.forEach((p, i) => {
            const delay  = (i % 15) * 0.04;
            const tagCls = p.tag === 'Trend'
                ? 'text-orange-500 border-orange-200'
                : 'text-gray-400 border-gray-200';
            html += `
            <div class="product-card group cursor-pointer animate-fade-up" style="animation-delay:${delay}s;opacity:0">
                <div class="img-wrap w-full aspect-[4/5] relative mb-5">
                    <img src="${p.img}" alt="${p.name}"
                         class="w-full h-full object-cover img-zoom" loading="lazy"
                         onerror="this.onerror=null;this.src='https://picsum.photos/seed/${p.id}/600/750'">
                    <div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    <div class="absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 translate-y-2 group-hover:translate-y-0 transition-all duration-500">
                        <button class="w-10 h-10 bg-gray-900 rounded-full flex items-center justify-center text-white hover:bg-gray-700 shadow-md">
                            <i class="ph ph-plus text-lg"></i>
                        </button>
                    </div>
                    <div class="absolute top-4 left-4">
                        <span class="bg-white text-gray-900 text-[9px] font-bold tracking-widest uppercase px-2 py-1 shadow-sm">${p.targetBrand.toUpperCase()}</span>
                    </div>
                </div>
                <div class="flex flex-col">
                    <div class="flex justify-between items-baseline mb-1">
                        <span class="text-[10px] text-gray-400 font-medium tracking-[0.15em] uppercase">${p.line}</span>
                        <span class="text-[9px] ${tagCls} border px-1.5 py-0.5 rounded-sm uppercase tracking-wider">${p.tag}</span>
                    </div>
                    <h4 class="font-medium text-gray-900 text-[13px] leading-relaxed mb-3 line-clamp-2">${p.name}</h4>
                    <div class="flex items-baseline gap-2.5 mt-auto">
                        <span class="text-base font-serif-elegant font-bold text-gray-900">$${p.price.toFixed(2)}</span>
                        <span class="text-[10px] text-gray-400 line-through">MSRP $${p.origPrice.toFixed(2)}</span>
                    </div>
                </div>
            </div>`;
        });
        grid.innerHTML = html;
    }

    function showProducts(data, title, subtitle) {
        renderProducts(data);
        document.getElementById('catalog-title').innerText    = title;
        document.getElementById('catalog-subtitle').innerText = subtitle;
        document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderProducts(fullCatalog); // 初始渲染

    // ═══════════════════════════════════════════════════════
    //  BRAND FILTER
    // ═══════════════════════════════════════════════════════
    function filterCatalog(brand) {
        document.querySelectorAll('.nav-btn').forEach(btn => {
            const active = btn.dataset.filter === brand;
            const line   = btn.querySelector('.nav-line');
            line.classList.toggle('scale-x-100',  active);
            line.classList.toggle('scale-x-0',   !active);
            btn.classList.toggle('text-gray-900',  active);
            btn.classList.toggle('text-gray-400', !active);
        });
        const filtered = brand === 'all'
            ? fullCatalog
            : fullCatalog.filter(p => p.targetBrand === brand);
        showProducts(
            filtered,
            brand === 'all' ? 'Curated Selection 2026.' : `${brand.toUpperCase()} Exclusive.`,
            brand === 'all'
                ? `DISPLAYING ${filtered.length} ITEMS`
                : `FILTERED: ${filtered.length} ITEMS MATCHED`
        );
    }

    // ═══════════════════════════════════════════════════════
    //  FIX 1 ── 中文語意關鍵字搜尋
    //
    //  核心邏輯：
    //  「椅子」→ 拆成 ['椅','子'] → '子' 是語法後綴(停用詞) → 過濾掉
    //  → 只留 ['椅'] → 在商品名稱搜尋含「椅」的商品
    //  → 正確返回: 扶手椅、單椅、露營椅
    // ═══════════════════════════════════════════════════════
    const CJK_STOP = new Set([
        '的','了','是','在','和','有','一','这','个','不','也',
        '我','你','他','她','它','子','地','得','着','过','被',
        '把','让','给','比','跟','同','从','对','向','里','外',
        '上','下','前','后','左','右','中','很','都','但','就',
        '因','为','以','所','而','那','些','多','少','大','小',
        '啊','哦','喔','嗯','吧','呢','吗'
    ]);

    function searchProducts(query) {
        const q = query.trim();
        if (!q) return null;

        // 提取有意義的中文字元（排除停用詞）
        const cjkChars = (q.match(/[\u4e00-\u9fff]/g) || []).filter(c => !CJK_STOP.has(c));
        // 提取英文/數字詞（長度 ≥ 2）
        const engWords  = (q.toLowerCase().match(/[a-z0-9]{2,}/g) || []);

        if (!cjkChars.length && !engWords.length) return null;

        const scored = fullCatalog.map(p => {
            let score = 0;
            // 完整詞組命中 → 最高分
            if (p.name.toLowerCase().includes(q.toLowerCase())) score += 20;
            // 逐字元命中（名稱 > 分類）
            cjkChars.forEach(c => {
                if (p.name.includes(c)) score += 3;
                if (p.line.includes(c)) score += 1;
            });
            // 英文詞命中
            engWords.forEach(w => {
                if (p.name.toLowerCase().includes(w)) score += 3;
                if (p.line.toLowerCase().includes(w)) score += 1;
            });
            return { ...p, _score: score };
        })
        .filter(p => p._score > 0)
        .sort((a, b) => b._score - a._score);

        return scored.length ? scored : null;
    }

    // ═══════════════════════════════════════════════════════
    //  FIX 2 ── PDF 下載（真實可用）
    //
    //  實作：window.open + document.write → 新分頁渲染 HTML 目錄表
    //        → 600ms 後自動喚起系統列印對話框 → 選「另存為 PDF」
    //  降級：彈窗被攔截時 → 下載 .html 檔，附操作提示
    // ═══════════════════════════════════════════════════════
    function downloadPDF() {
        const products     = currentDisplayedProducts;
        const catalogTitle = document.getElementById('catalog-title').innerText;

        const rows = products.map((p, i) => `
            <tr>
                <td class="cn">${String(i+1).padStart(3,'0')}</td>
                <td class="ci">
                    <img src="${p.img}" width="50" height="63"
                         style="object-fit:cover;display:block;border-radius:2px"
                         onerror="this.src='https://picsum.photos/seed/${p.id}/50/63'">
                </td>
                <td class="cb">${p.targetBrand.toUpperCase()}</td>
                <td class="cm">${p.name}</td>
                <td>${p.line}</td>
                <td class="ct" style="color:${p.tag==='Trend'?'#f97316':'#888'}">${p.tag}</td>
                <td class="cp"><strong>$${p.price.toFixed(2)}</strong></td>
                <td class="cr">$${p.origPrice.toFixed(2)}</td>
            </tr>`).join('');

        const pdfHTML = `<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>SPATZ GLOBAL — ${catalogTitle}</title>
<style>
/* 使用系統 CJK 字型，無需加載外部字型，列印更快速穩定 */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft JhengHei','PingFang TC','Noto Sans CJK TC',Arial,sans-serif;
     background:#fff;color:#1a1a1a;padding:36px 40px;font-size:11px}
.tip{background:#fffbe6;border:1px solid #ffe58f;border-radius:4px;
     padding:8px 14px;margin-bottom:18px;font-size:10px;color:#7a6a00}
.hd{display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid #1a1a1a;padding-bottom:14px;margin-bottom:20px}
.logo{font-size:20px;font-weight:700;letter-spacing:5px}
.sub{font-size:9px;color:#999;letter-spacing:2px;margin-top:4px}
.meta{font-size:9px;color:#aaa;text-align:right;line-height:1.8;letter-spacing:1px}
table{width:100%;border-collapse:collapse}
thead tr{background:#1a1a1a}
thead th{color:#fff;padding:9px 8px;font-size:9px;letter-spacing:1.5px;text-align:left;font-weight:700}
tbody tr:nth-child(even){background:#f8f8f8}
tbody td{padding:7px 8px;border-bottom:1px solid #efefef;vertical-align:middle}
.cn{color:#bbb;font-size:9px;width:30px}
.ci{width:66px}
.cb{font-weight:700;font-size:9px;letter-spacing:1px;width:60px}
.cm{font-weight:500;max-width:210px;line-height:1.5}
.ct{font-size:9px;letter-spacing:1px;font-weight:700;width:46px}
.cp{white-space:nowrap}
.cr{color:#bbb;text-decoration:line-through;font-size:10px;white-space:nowrap}
.ft{margin-top:14px;font-size:9px;color:#ccc;display:flex;justify-content:space-between}
@media print{
    @page{size:A4 landscape;margin:10mm}
    body{padding:0}
    .tip{display:none} /* 提示條列印時自動隱藏 */
    thead{display:table-header-group}
}
</style>
</head><body>
<div class="tip">💡 按 <strong>Ctrl + P</strong>（Mac 用 <strong>⌘ + P</strong>），選擇「另存為 PDF」即可下載目錄。</div>
<div class="hd">
    <div>
        <div class="logo">SPATZ GLOBAL</div>
        <div class="sub">PRODUCT CATALOG — ${catalogTitle.toUpperCase()}</div>
    </div>
    <div class="meta">
        ${products.length} ITEMS TOTAL<br>
        ${new Date().toLocaleDateString('zh-TW')}<br>
        FOR INTERNAL USE ONLY
    </div>
</div>
<table>
<thead><tr>
    <th>#</th><th>IMG</th><th>BRAND</th><th>PRODUCT NAME</th>
    <th>CATEGORY</th><th>TAG</th><th>PRICE</th><th>MSRP</th>
</tr></thead>
<tbody>${rows}</tbody>
</table>
<div class="ft">
    <span>SPATZ GLOBAL © 2026</span>
    <span>${products.length} items exported</span>
</div>
<script>
// 等頁面載入完成（含圖片）後自動喚起列印
window.addEventListener('load', function() {
    setTimeout(function() { window.print(); }, 700);
});
<\/script>
</body></html>`;

        // 嘗試開啟新視窗
        const win = window.open('', '_blank', 'width=1020,height=760,scrollbars=yes');
        if (win) {
            win.document.write(pdfHTML);
            win.document.close();
        } else {
            // 降級方案：彈窗被瀏覽器攔截時，直接下載 HTML 檔案
            const blob = new Blob([pdfHTML], { type: 'text/html;charset=utf-8' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href     = url;
            a.download = `spatz-catalog-${Date.now()}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    }

    // ═══════════════════════════════════════════════════════
    //  CHAT ENGINE
    // ═══════════════════════════════════════════════════════
    const chatForm     = document.getElementById('chat-form');
    const chatInput    = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    window.sendPredefinedMessage = function(msg) {
        chatInput.value = msg;
        handleUserSubmit(new Event('submit'));
    };
    chatForm.addEventListener('submit', handleUserSubmit);

    function handleUserSubmit(e) {
        e.preventDefault();
        const msg = chatInput.value.trim();
        if (!msg) return;
        appendUserMessage(msg);
        chatInput.value = '';
        const tid = showTypingIndicator();
        setTimeout(() => { removeTypingIndicator(tid); processAIResponse(msg); }, 1200);
    }

    function appendUserMessage(msg) {
        chatMessages.insertAdjacentHTML('beforeend', `
            <div class="flex justify-end">
                <div class="bg-gray-100 text-gray-800 rounded-lg px-4 py-2.5 max-w-[85%] text-[12px] leading-relaxed">${msg}</div>
            </div>`);
        scrollToBottom();
    }

    function showTypingIndicator() {
        const id = 'typing-' + Date.now();
        chatMessages.insertAdjacentHTML('beforeend', `
            <div id="${id}" class="flex">
                <div class="bg-white border border-gray-100 rounded-lg px-3 py-3 shadow-sm">
                    <svg class="w-8 h-4" viewBox="0 0 32 16">
                        <circle class="typing-dot" cx="6"  cy="8" r="3"></circle>
                        <circle class="typing-dot" cx="16" cy="8" r="3"></circle>
                        <circle class="typing-dot" cx="26" cy="8" r="3"></circle>
                    </svg>
                </div>
            </div>`);
        scrollToBottom();
        return id;
    }

    function removeTypingIndicator(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    function addAIBubble(text) {
        chatMessages.insertAdjacentHTML('beforeend', `
            <div class="flex">
                <div class="bg-white border border-gray-100 text-gray-700 rounded-lg px-4 py-3 max-w-[85%] text-[12px] leading-relaxed shadow-sm">
                    ${text}
                    <div class="mt-3 pt-3 border-t border-gray-50">
                        <button onclick="downloadPDF()" class="text-[10px] uppercase tracking-widest font-bold text-gray-900 hover:text-gray-500 transition-colors flex items-center gap-1.5">
                            <i class="ph-bold ph-download-simple"></i> Download PDF
                        </button>
                    </div>
                </div>
            </div>`);
        scrollToBottom();
    }

    // ═══════════════════════════════════════════════════════
    //  AI RESPONSE  ── FIX 1 整合在此
    // ═══════════════════════════════════════════════════════
    function processAIResponse(rawMsg) {
        const msg     = rawMsg.toLowerCase();
        let   aiText  = '';
        let   handled = false;

        // ── 優先級 1：品牌路由 ──
        if (msg.includes('tchibo') || msg.includes('戶外') || msg.includes('咖啡') ||
            msg.includes('園藝')   || msg.includes('旅行') || msg.includes('露營')) {
            filterCatalog('tchibo');
            aiText = `<p class="font-medium mb-1">已鎖定 Tchibo 畫冊。</p>
                      <p class="text-gray-500">庭院沙發、遮陽傘、咖啡機等爆款備妥，報價具競爭優勢。</p>`;
            handled = true;

        } else if (msg.includes('lidl')    || msg.includes('性價比') || msg.includes('廚具') ||
                   msg.includes('五金')    || msg.includes('工具')   || msg.includes('嬰兒') ||
                   msg.includes('瑜珈')    || msg.includes('健身')   || msg.includes('運動')) {
            filterCatalog('lidl');
            aiText = `<p class="font-medium mb-1">Lidl 專區已就緒。</p>
                      <p class="text-gray-500">PARKSIDE 五金 × SILVERCREST 廚電，極致性價比策略。</p>`;
            handled = true;

        } else if (msg.includes('ikea') || msg.includes('傢俱') || msg.includes('家紡') ||
                   msg.includes('書櫃') || msg.includes('地毯') || msg.includes('燈具') ||
                   msg.includes('盆栽') || msg.includes('推車') || msg.includes('床')) {
            filterCatalog('ikea');
            aiText = `<p class="font-medium mb-1">IKEA 經典陣列已載入。</p>
                      <p class="text-gray-500">POÄNG、BILLY、KALLAX 等長年熱銷 Basic 系列，供應充沛。</p>`;
            handled = true;
        }

        // ── 優先級 2：商品關鍵字搜尋 (FIX 1) ──
        if (!handled) {
            const results = searchProducts(rawMsg);

            if (results && results.length > 0) {
                // 關鍵字搜尋為跨品牌結果 → 清除所有導覽底線高亮
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    const line = btn.querySelector('.nav-line');
                    line.classList.remove('scale-x-100');
                    line.classList.add('scale-x-0');
                    btn.classList.remove('text-gray-900');
                    btn.classList.add('text-gray-400');
                });

                showProducts(results, `搜尋：「${rawMsg}」`, `FOUND: ${results.length} ITEMS`);

                // 取前 3 個不重複的基礎商品名作預覽
                const preview = [...new Set(
                    results.slice(0, 6).map(p => p.name.split(' — ')[0])
                )].slice(0, 3).join('、');

                aiText = `<p class="font-medium mb-1">搜尋「${rawMsg}」— 找到 ${results.length} 款</p>
                          <p class="text-gray-500">${preview}… 依相關度排列。</p>`;

            } else {
                // 找不到 → 回到全覽
                filterCatalog('all');
                aiText = `<p class="text-gray-500">找不到「${rawMsg}」相關商品，已恢復全部 ${fullCatalog.length} 款。</p>`;
            }
        }

        addAIBubble(aiText);
    }

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    </script>
</body>
</html>
